name: Test VPN Access to WebClass

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install openvpn
        run: sudo apt-get install -y openvpn

      - name: Get VPN Gate config (Japan)
        run: |
          curl -s "https://www.vpngate.net/api/iphone/" \
            | grep -v "^#" | grep ",JP," | head -1 \
            | awk -F',' '{print $15}' \
            | tr -d '\r\n ' \
            | base64 -d > /tmp/vpngate-jp.ovpn
          echo "Config lines: $(wc -l < /tmp/vpngate-jp.ovpn)"

      - name: Connect VPN
        run: |
          sudo openvpn \
            --config /tmp/vpngate-jp.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' \
            --daemon
          sleep 8
          echo "Current IP: $(curl -s ifconfig.me)"

      - name: Test WebClass access
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then echo "SUCCESS"; else echo "FAILED"; exit 1; fi
