name: Test VPN Access to WebClass

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install openvpn
        run: sudo apt-get install -y openvpn

      - name: Get VPN Gate configs (Japan top-5 by speed)
        run: |
          curl -s "https://www.vpngate.net/api/iphone/" \
            | grep -v "^#" | grep ",JP," \
            | sort -t',' -k5 -rn \
            | awk -F',' 'NR<=5{print NR, $15}' > /tmp/vpn_list.txt
          echo "取得サーバー数: $(wc -l < /tmp/vpn_list.txt)"

      - name: Try server 1
        id: vpn1
        continue-on-error: true
        run: |
          awk 'NR==1{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' \
            --route-nopull --daemon
          sleep 8
          WEBCLASS_IP=$(getent hosts gymnast15.med.kagawa-u.ac.jp | awk '{print $1; exit}')
          sudo ip route add "$WEBCLASS_IP" dev tun0
          echo "IP (direct): $(curl -s ifconfig.me)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Try server 2
        id: vpn2
        if: steps.vpn1.outcome == 'failure'
        continue-on-error: true
        run: |
          sudo killall openvpn 2>/dev/null || true; sleep 2
          awk 'NR==2{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' \
            --route-nopull --daemon
          sleep 8
          WEBCLASS_IP=$(getent hosts gymnast15.med.kagawa-u.ac.jp | awk '{print $1; exit}')
          sudo ip route add "$WEBCLASS_IP" dev tun0
          echo "IP (direct): $(curl -s ifconfig.me)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Try server 3
        id: vpn3
        if: steps.vpn1.outcome == 'failure' && steps.vpn2.outcome == 'failure'
        continue-on-error: true
        run: |
          sudo killall openvpn 2>/dev/null || true; sleep 2
          awk 'NR==3{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' \
            --route-nopull --daemon
          sleep 8
          WEBCLASS_IP=$(getent hosts gymnast15.med.kagawa-u.ac.jp | awk '{print $1; exit}')
          sudo ip route add "$WEBCLASS_IP" dev tun0
          echo "IP (direct): $(curl -s ifconfig.me)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Try server 4
        id: vpn4
        if: steps.vpn1.outcome == 'failure' && steps.vpn2.outcome == 'failure' && steps.vpn3.outcome == 'failure'
        continue-on-error: true
        run: |
          sudo killall openvpn 2>/dev/null || true; sleep 2
          awk 'NR==4{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' \
            --route-nopull --daemon
          sleep 8
          WEBCLASS_IP=$(getent hosts gymnast15.med.kagawa-u.ac.jp | awk '{print $1; exit}')
          sudo ip route add "$WEBCLASS_IP" dev tun0
          echo "IP (direct): $(curl -s ifconfig.me)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Try server 5
        id: vpn5
        if: steps.vpn1.outcome == 'failure' && steps.vpn2.outcome == 'failure' && steps.vpn3.outcome == 'failure' && steps.vpn4.outcome == 'failure'
        continue-on-error: true
        run: |
          sudo killall openvpn 2>/dev/null || true; sleep 2
          awk 'NR==5{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' \
            --route-nopull --daemon
          sleep 8
          WEBCLASS_IP=$(getent hosts gymnast15.med.kagawa-u.ac.jp | awk '{print $1; exit}')
          sudo ip route add "$WEBCLASS_IP" dev tun0
          echo "IP (direct): $(curl -s ifconfig.me)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Check at least one VPN succeeded
        run: |
          if [ "${{ steps.vpn1.outcome }}" = "success" ] || \
             [ "${{ steps.vpn2.outcome }}" = "success" ] || \
             [ "${{ steps.vpn3.outcome }}" = "success" ] || \
             [ "${{ steps.vpn4.outcome }}" = "success" ] || \
             [ "${{ steps.vpn5.outcome }}" = "success" ]; then
            echo "VPN接続成功"
          else
            echo "全サーバー失敗"
            exit 1
          fi
