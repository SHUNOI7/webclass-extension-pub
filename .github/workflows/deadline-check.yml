name: WebClass Deadline Check

on:
  schedule:
    - cron: '0 22 * * *'  # 毎朝7時 JST (= UTC 22:00 前日)
  workflow_dispatch:       # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openvpn
        run: sudo apt-get install -y openvpn

      - name: Get VPN Gate configs (Japan, 5 servers)
        run: |
          curl -s "https://www.vpngate.net/api/iphone/" \
            | grep -v "^#" | grep ",JP," \
            | awk -F',' 'NR<=5{print NR, $15}' > /tmp/vpn_list.txt
          echo "取得サーバー数: $(wc -l < /tmp/vpn_list.txt)"

      - name: Try VPN server 1
        id: vpn1
        continue-on-error: true
        run: |
          awk 'NR==1{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' --daemon
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"; [ "$STATUS" = "200" ]

      - name: Try VPN server 2
        id: vpn2
        if: steps.vpn1.outcome == 'failure'
        continue-on-error: true
        run: |
          sudo killall openvpn 2>/dev/null || true; sleep 2
          awk 'NR==2{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' --daemon
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"; [ "$STATUS" = "200" ]

      - name: Try VPN server 3
        id: vpn3
        if: steps.vpn1.outcome == 'failure' && steps.vpn2.outcome == 'failure'
        continue-on-error: true
        run: |
          sudo killall openvpn 2>/dev/null || true; sleep 2
          awk 'NR==3{print $2}' /tmp/vpn_list.txt | tr -d '\r\n ' | base64 -d > /tmp/vpn.ovpn
          sudo openvpn --config /tmp/vpn.ovpn \
            --data-ciphers 'AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305:AES-128-CBC' --daemon
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://gymnast15.med.kagawa-u.ac.jp/webclass/login.php)
          echo "WebClass: $STATUS"; [ "$STATUS" = "200" ]

      - name: Fail if no VPN connected
        if: steps.vpn1.outcome == 'failure' && steps.vpn2.outcome == 'failure' && steps.vpn3.outcome == 'failure'
        run: echo "全VPNサーバー失敗" && exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run deadline check
        run: node check-deadlines.mjs
        working-directory: scripts
        env:
          GAS_URL:              ${{ secrets.GAS_URL }}
          GAS_ADMIN_KEY:        ${{ secrets.GAS_ADMIN_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
